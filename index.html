<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kèo Nhậu Anh Em</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Kèo Nhậu">
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/144/beer.png">

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; -webkit-user-select: auto; user-select: auto; }
        .container { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #e64a19; }
        input, button { width: 100%; padding: 12px; margin: 8px 0 20px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; display: block !important; outline: none; }
        .btn-confirm { background: #2e7d32; color: white; font-weight: bold; border: none; cursor: pointer; }
        .list-item { background: #fffde7; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 6px solid #fbc02d; }
        .actions { display: flex; gap: 10px; margin-top: 10px; }
        .edit-btn { background: #0288d1; color: white; border: none; padding: 8px 15px; border-radius: 5px; flex: 1; }
        .delete-btn { background: #d32f2f; color: white; border: none; padding: 8px 15px; border-radius: 5px; flex: 1; display: none; }
    </style>
</head>
<body>

<div class="container" id="form-top">
    <h2>🍻 KÈO NHẬU ANH EM</h2>
    <input type="text" id="userName" placeholder="Tên của bạn..." oninput="checkAdmin(this.value)">
    <input type="datetime-local" id="userTime">
    <button class="btn-confirm" onclick="saveData()">XÁC NHẬN ĐI NHẬU</button>
    <div id="dataList">Đang tải danh sách...</div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyDtwQeujQNc9pP_HsGjd5iF51WAlv_OaBY",
      authDomain: "chonngay-bc2ef.firebaseapp.com",
      projectId: "chonngay-bc2ef",
      storageBucket: "chonngay-bc2ef.firebasestorage.app",
      messagingSenderId: "326020235650",
      appId: "1:326020235650:web:17b0f32a3ebc0a28fd4f9b",
      measurementId: "G-NJ0959QNGS"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const adminPass = "1234";

    function checkAdmin(val) {
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.style.display = (val === adminPass) ? "block" : "none";
        });
    }

    function saveData() {
        const name = document.getElementById('userName').value.trim();
        const time = document.getElementById('userTime').value;
        if (!name || !time) return alert("Nhập đủ tên và giờ nhậu!");
        if (name === adminPass) return alert("Mã xóa!");

        db.collection("lich-nhau").doc(name).set({
            name: name, time: time, timestamp: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => {
            alert("Đã xong!");
            document.getElementById('userName').value = "";
            document.getElementById('userTime').value = "";
            checkAdmin("");
        });
    }

    function deleteData(name) {
        if (confirm("Xóa kèo này?")) {
            db.collection("lich-nhau").doc(name).delete();
        }
    }

    db.collection("lich-nhau").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
        const listDiv = document.getElementById('dataList');
        listDiv.innerHTML = "<h3>📍 Danh sách:</h3>";
        snapshot.forEach((doc) => {
            const data = doc.data();
            const dateStr = new Date(data.time).toLocaleString('vi-VN');
            listDiv.innerHTML += `
                <div class="list-item">
                    <strong>${data.name}</strong>: ${dateStr}
                    <div class="actions">
                        <button class="edit-btn" onclick="editData('${data.name}', '${data.time}')">Sửa</button>
                        <button class="delete-btn" onclick="deleteData('${data.name}')">XOÁ</button>
                    </div>
                </div>`;
        });
    });

    function editData(name, time) {
        document.getElementById('userName').value = name;
        document.getElementById('userTime').value = time;
        document.getElementById('form-top').scrollIntoView({ behavior: 'smooth' });
    }
</script>
</body>
</html>
